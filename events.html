<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KC Events Board</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0f14;
      --surface: #16181f;
      --surface2: #1e2029;
      --border: #2a2d3a;
      --text: #e4e6f0;
      --muted: #6b7090;
      --accent: #7b9cff;
      --on-now: #2dba8c;
      --on-now-dim: #1a3d30;
      --warn: #f0a84a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 32px 28px;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    * { position: relative; z-index: 1; }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .wordmark span { color: var(--accent); font-style: italic; }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .last-updated {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      align-items: center;
    }

    .filter-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-right: 4px;
    }

    .cat-chip {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      opacity: 0.4;
      transition: opacity 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cat-chip.active { opacity: 1; }

    /* Section headers */
    .section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title {
      font-family: 'Fraunces', serif;
      font-size: 0.95rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }

    .section-title.on-now-title {
      color: var(--on-now);
      font-weight: 600;
      font-style: normal;
    }

    .section-count {
      font-size: 0.68rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 7px;
      border-radius: 20px;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* On Now pulse dot */
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--on-now);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,186,140,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(45,186,140,0); }
    }

    /* Cards */
    .cards { display: flex; flex-direction: column; gap: 8px; }

    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .event-card:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .event-card.on-now-card {
      background: var(--on-now-dim);
      border-color: var(--on-now);
      border-left-color: var(--on-now);
    }

    .event-card.on-now-card:hover { border-color: var(--on-now); filter: brightness(1.1); }

    /* Date block */
    .date-block {
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .date-block .month {
      font-size: 0.62rem;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .date-block .day {
      font-size: 1.6rem;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
    }

    .date-block .end-date {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.3;
    }

    .on-now-card .date-block .day { color: var(--on-now); }

    /* Event info */
    .event-info { flex: 1; min-width: 0; }

    .event-name {
      font-size: 0.92rem;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-name a { color: inherit; text-decoration: none; }
    .event-name a:hover { color: var(--accent); }

    .event-meta {
      display: flex;
      gap: 14px;
      font-size: 0.75rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .event-notes {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 5px;
      font-style: italic;
    }

    /* Right side badges */
    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .cat-badge {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .countdown {
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    .countdown.soon { color: var(--warn); }
    .countdown.on-now-label { color: var(--on-now); font-weight: 500; }

    /* Empty state */
    .empty {
      color: var(--muted);
      font-size: 0.8rem;
      padding: 12px 0;
      font-style: italic;
    }

    #status {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 0.85rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.3;
      padding-right: 12px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-meta {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 2;
    }

    .modal-notes {
      margin-top: 12px;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .modal-link {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      font-size: 0.82rem;
      text-decoration: none;
    }

    .modal-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="wordmark">KC <span>Events</span></div>
  <div class="controls">
    <span class="last-updated" id="last-updated"></span>
    <button class="refresh-btn" onclick="loadData()">&#8635; refresh</button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">filter</span>
  <div id="cat-filters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
</div>

<div id="status">Loading events...</div>
<div id="board"></div>

<div class="modal-overlay" id="modal" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-top">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">&#215;</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-notes" id="modal-notes"></div>
    <a class="modal-link" id="modal-link" target="_blank"></a>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSD9F_W6BfQpgMP_f1U-0NiCfBnew_7jVkV7U55vtR2bn7mFBccvH9g25iPJENRjWyhz6MqdYQlf5g4/pub?gid=0&single=true&output=csv';

const CAT_COLORS = {
  food:'#f59e42', arts:'#a78bfa', cycling:'#34d399', music:'#f472b6',
  sports:'#38bdf8', community:'#fb923c', museum:'#e8c06a', events:'#7b9cff', other:'#94a3b8'
};

function catColor(cat) { return CAT_COLORS[(cat||'').toLowerCase()] || CAT_COLORS.other; }

let allEvents = [], activeFilters = new Set();

async function loadData() {
  document.getElementById('status').textContent = 'Loading...';
  document.getElementById('status').style.display = 'block';
  document.getElementById('board').innerHTML = '';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    allEvents = parseCSV(text);
    document.getElementById('last-updated').textContent = 'updated ' + new Date().toLocaleTimeString();
    buildFilters();
    render();
  } catch(err) {
    document.getElementById('status').textContent = 'Could not load data.';
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/ /g,'_'));
  return lines.slice(1).map(line => {
    const cols = splitCSV(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (cols[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  }).filter(e => e.event_name);
}

function splitCSV(line) {
  const out = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
    else cur += c;
  }
  out.push(cur);
  return out;
}

function gf(e, ...keys) { for (const k of keys) if (e[k]) return e[k]; return ''; }

function pd(s) {
  if (!s) return null;
  // handle both YYYY-MM-DD and M/D/YYYY
  if (s.includes('/')) {
    const [m,d,y] = s.split('/');
    return new Date(+y, +m-1, +d);
  }
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function fd(d) {
  if (!d) return '';
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function daysUntil(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function buildFilters() {
  const cats = [...new Set(allEvents.map(e => gf(e,'category')).filter(Boolean))];
  activeFilters = new Set(cats);
  const container = document.getElementById('cat-filters');
  container.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('span');
    chip.className = 'cat-chip active';
    chip.textContent = cat;
    const c = catColor(cat);
    chip.style.cssText = `background:${c}22;border-color:${c};color:${c}`;
    chip.onclick = () => {
      if (activeFilters.has(cat)) activeFilters.delete(cat);
      else activeFilters.add(cat);
      chip.classList.toggle('active');
      render();
    };
    container.appendChild(chip);
  });
}

function categorize(events) {
  const today = new Date(); today.setHours(0,0,0,0);
  const now = new Date();

  const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const nextMonthStart = new Date(now.getFullYear(), now.getMonth()+1, 1);
  const nextMonthEnd   = new Date(now.getFullYear(), now.getMonth()+2, 0);

  const onNow = [], thisMonth = [], nextMonth = [], later = [];

  events.forEach(e => {
    const start = pd(gf(e,'start_date'));
    const end   = pd(gf(e,'end_date')) || start;
    if (!start) return;

    const endD = new Date(end); endD.setHours(23,59,59);
    if (endD < today) return; // past

    const cat = gf(e,'category');
    if (cat && !activeFilters.has(cat)) return;

    const startD = new Date(start); startD.setHours(0,0,0,0);

    // On Now: multi-day event already started and hasn't ended
    const isMultiDay = end && end.getTime() !== start.getTime();
    if (isMultiDay && startD <= today && endD >= today) {
      onNow.push(e);
    } else if (startD >= thisMonthStart && startD <= thisMonthEnd) {
      thisMonth.push(e);
    } else if (startD >= nextMonthStart && startD <= nextMonthEnd) {
      nextMonth.push(e);
    } else if (startD > nextMonthEnd) {
      later.push(e);
    }
  });

  const byDate = (a, b) => pd(gf(a,'start_date')) - pd(gf(b,'start_date'));
  return {
    onNow:     onNow.sort(byDate),
    thisMonth: thisMonth.sort(byDate),
    nextMonth: nextMonth.sort(byDate),
    later:     later.sort(byDate),
  };
}

function countdownLabel(e) {
  const start = pd(gf(e,'start_date'));
  const end   = pd(gf(e,'end_date')) || start;
  const today = new Date(); today.setHours(0,0,0,0);
  const startD = new Date(start); startD.setHours(0,0,0,0);
  const endD   = new Date(end);   endD.setHours(0,0,0,0);

  // currently running
  if (startD <= today && endD >= today) {
    const daysLeft = daysUntil(endD);
    if (daysLeft === 0) return { text: 'ends today', cls: 'on-now-label' };
    if (daysLeft === 1) return { text: 'ends tomorrow', cls: 'on-now-label' };
    return { text: `ends in ${daysLeft}d`, cls: 'on-now-label' };
  }

  const days = daysUntil(startD);
  if (days === 0) return { text: 'today', cls: 'soon' };
  if (days === 1) return { text: 'tomorrow', cls: 'soon' };
  if (days <= 7)  return { text: `in ${days}d`, cls: 'soon' };
  return { text: `in ${days}d`, cls: '' };
}

function render() {
  const { onNow, thisMonth, nextMonth, later } = categorize(allEvents);
  const board = document.getElementById('board');
  const status = document.getElementById('status');
  const total = onNow.length + thisMonth.length + nextMonth.length + later.length;
  status.style.display = total ? 'none' : 'block';
  if (!total) { status.textContent = 'No upcoming events.'; return; }
  board.innerHTML = '';

  if (onNow.length)     board.appendChild(makeSection('on now', onNow, true));
  if (thisMonth.length) board.appendChild(makeSection('this month', thisMonth));
  if (nextMonth.length) board.appendChild(makeSection('next month', nextMonth));
  if (later.length)     board.appendChild(makeSection('later', later));
}

function makeSection(title, events, isOnNow = false) {
  const sec = document.createElement('div');
  sec.className = 'section';

  const hdr = document.createElement('div');
  hdr.className = 'section-header';

  if (isOnNow) {
    const dot = document.createElement('div');
    dot.className = 'pulse-dot';
    hdr.appendChild(dot);
  }

  const t = document.createElement('span');
  t.className = 'section-title' + (isOnNow ? ' on-now-title' : '');
  t.textContent = title;
  hdr.appendChild(t);

  const count = document.createElement('span');
  count.className = 'section-count';
  count.textContent = events.length;
  hdr.appendChild(count);

  const line = document.createElement('div');
  line.className = 'section-line';
  hdr.appendChild(line);

  sec.appendChild(hdr);

  const cards = document.createElement('div');
  cards.className = 'cards';
  events.forEach(e => cards.appendChild(makeCard(e, isOnNow)));
  sec.appendChild(cards);

  return sec;
}

function makeCard(e, isOnNow) {
  const name   = gf(e,'event_name');
  const startD = pd(gf(e,'start_date'));
  const endD   = pd(gf(e,'end_date'));
  const time   = gf(e,'time');
  const loc    = gf(e,'location');
  const link   = gf(e,'link');
  const cat    = gf(e,'category');
  const notes  = gf(e,'notes');
  const color  = catColor(cat);

  const card = document.createElement('div');
  card.className = 'event-card' + (isOnNow ? ' on-now-card' : '');
  card.style.borderLeftColor = color;

  const monthStr = startD ? startD.toLocaleDateString('en-US',{month:'short'}) : '';
  const dayStr   = startD ? startD.getDate() : '?';
  const endStr   = endD && startD && endD.getTime() !== startD.getTime()
    ? '\u2192 ' + endD.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

  const cd = countdownLabel(e);

  card.innerHTML = `
    <div class="date-block">
      <div class="month">${monthStr}</div>
      <div class="day">${dayStr}</div>
      ${endStr ? `<div class="end-date">${endStr}</div>` : ''}
    </div>
    <div class="event-info">
      <div class="event-name">${link
        ? `<a href="${link}" target="_blank" onclick="event.stopPropagation()">${name}</a>`
        : name}</div>
      <div class="event-meta">
        ${time ? `<span>&#128336; ${time}</span>` : ''}
        ${loc  ? `<span>&#128205; ${loc}</span>`  : ''}
      </div>
      ${notes ? `<div class="event-notes">${notes}</div>` : ''}
    </div>
    <div class="card-right">
      ${cat ? `<span class="cat-badge" style="background:${color}20;color:${color};border-color:${color}44">${cat}</span>` : ''}
      <span class="countdown ${cd.cls}">${cd.text}</span>
    </div>
  `;

  card.addEventListener('click', () => openModal(e));
  return card;
}

function openModal(e) {
  const startD = pd(gf(e,'start_date'));
  const endD   = pd(gf(e,'end_date'));
  const link   = gf(e,'link');
  document.getElementById('modal-title').textContent = gf(e,'event_name');
  let meta = '';
  if (startD) {
    meta += `&#128197; ${fd(startD)}`;
    if (endD && endD.getTime() !== startD.getTime()) meta += ` &rarr; ${fd(endD)}`;
    meta += '<br>';
  }
  if (gf(e,'time'))     meta += `&#128336; ${gf(e,'time')}<br>`;
  if (gf(e,'location')) meta += `&#128205; ${gf(e,'location')}<br>`;
  if (gf(e,'category')) meta += `&#127991; ${gf(e,'category')}`;
  document.getElementById('modal-meta').innerHTML = meta;
  document.getElementById('modal-notes').textContent = gf(e,'notes');
  const linkEl = document.getElementById('modal-link');
  if (link) { linkEl.href = link; linkEl.textContent = '&#128279; More info \u2192'; linkEl.style.display='inline'; }
  else linkEl.style.display = 'none';
  document.getElementById('modal').classList.add('open');
}

function closeModalOverlay(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
